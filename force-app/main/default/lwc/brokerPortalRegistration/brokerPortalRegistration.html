<template>
    <div class="container">
        <!-- Sidebar / Stepper -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src={logoImageSrcUrl} alt="ORA Logo" class="logo">
            </div>
            <h2 class="sidebar-title">Broker Registration</h2>
            <p class="sidebar-subtitle">
                Complete each step to register your brokerage. Details must match your company registration and licenses.
            </p>

            <ul class="stepper">
                <template for:each={stepItems} for:item="step">
                    <li key={step.num} class={step.cssClass} data-step={step.num} onclick={handleStepClick}>
                        <span class="step-indicator">
                            <template if:true={step.completed}>
                                <lightning-icon icon-name="utility:check" size="x-small" variant="inverse"></lightning-icon>
                            </template>
                            <template if:false={step.completed}>{step.num}</template>
                        </span>
                        <span class="step-text">
                            <span class="step-title">{step.title}</span>
                            <span class="step-desc">{step.subtitle}</span>
                        </span>
                    </li>
                </template>
            </ul>

            <p class="sidebar-login">
                Already a Registered Broker?
                <a href="javascript:void(0)" onclick={handleLoginPage} class="login-link">Login here</a>
            </p>
        </aside>

        <main class="content">
            <template if:false={showSuccessPage}>
                <div class="step-header">
                    <h1 class="title">{currentStepTitle}</h1>
                    <p class="subtitle">{currentStepDescription}</p>
                </div>

                <div class="form">

                    <span>
                        <template if:true={showError}>
                            <div class="error">
                                <lightning-formatted-rich-text style="color:red; font-size:16px; font-weight: bold;" value={errorMessage}></lightning-formatted-rich-text>
                            </div>
                        </template>
                        <br/>
                    </span>

                    <template if:true={Spinner}>
                        <div class="spinner-container">
                            <div class="spinner-overlay">
                                <lightning-spinner alternative-text="Loading" size="large"></lightning-spinner>
                            </div>
                        </div>
                    </template>

                    <template if:true={isStep1}>
                    <div class="step-section">
                    <template if:true={BrokerTypesValues.data}>
                        <lightning-combobox label="Brokerage Types"
                            placeholder="Brokerage Types" data-id="brokerageTypes" value={brokerageTypes}
                            options={BrokerTypesValues.data.values} onchange={handleInputChange} required>
                        </lightning-combobox>
                    </template>

                    <!-- Basic Information -->

                            <div class="slds-grid slds-gutters slds-wrap" style="margin-top:10px;">

                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="brokerageAgencyName" value={brokerageAgencyName}
                                        label="Brokerage Agency Name"  placeholder="Brokerage Agency Name" onchange={handleInputChange} required></lightning-input><!--pattern="^[a-zA-Z\s]*$"-->
                                </div>
                                <!-- Empty column -->
                                <div class="slds-col slds-size_1-of-2"></div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text" data-id="brokerOfficeName" value={brokerOfficeName}
                                        label="Broker Office Name"  placeholder="Broker Office Name" onchange={handleInputChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <template if:true={filteredAgencyLocationOptions}>
                                        <lightning-combobox
                                            label="Brokerage Agency Location"
                                            data-id="agencyLocation"
                                            value={formData.agencyLocation}
                                            placeholder="Brokerage Agency Location"
                                            options={filteredAgencyLocationOptions}
                                            onchange={handleInputChange}
                                            required>
                                        </lightning-combobox>
                                    </template>
                                    
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text" data-id="tradeLicenseName" value={tradeLicenseName} required
                                        label="Trade License Name"  placeholder="Trade License Name" onchange={handleInputChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input  type="text" label="Trade License Number" placeholder="Trade License Number" 
                                        value={tradeLicenseNumber} data-id="tradeLicenseNumber" onchange={handleInputChange} required></lightning-input>
                                    <template if:true={checkTradeLNumber}>
                                        <div style="color:red;font-weight: bold;">{errorDupliTradeMessage}</div>
                                    </template>
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <template if:false={internationLocation}>
                                        <lightning-input type="file" data-id="tradeLicenseCopy"
                                        accept={allowedFileTypes} required
                                        label="Trade License Copy" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                
                                    </template>
                                    <template if:true={internationLocation}>
                                        <lightning-input type="file" data-id="tradeLicenseCopy"
                                        accept={allowedFileTypes} required
                                        label="Trade License/Registration Certificate" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                
                                    </template>
                                    
                                    <template if:true={checktradeLicenseCopy}>
                                        <span style="color:green">Trade License Uploaded</span>
                                    </template>
                                    <template if:true={errortradeLicenseCopy}>
                                        <div style="color:red;font-weight: bold;">{errortradeLicenseCopyDoc}</div>
                                    </template>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="file" data-id="memorandumCopy"
                                        accept={allowedFileTypes} required
                                        label="Memorandum or Articles of Association" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                                    <template if:true={checkmemorandumCopy}>
                                        <span style="color:green">Memorandum Uploaded</span>
                                    </template>
                                    <template if:true={errormemorandumCopy}>
                                        <div style="color:red;font-weight: bold;">{errormemorandumCopyDoc}</div>
                                    </template>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="file" data-id="companyAddressProof"
                                        accept={allowedFileTypes} required
                                        label="Proof of the company's Registered Address" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                                    <template if:true={checkcompanyAddressProof}>
                                        <span style="color:green">Registered Address Proof Uploaded</span>
                                    </template>
                                    <template if:true={errorcompanyAddressProof}>
                                        <div style="color:red;font-weight: bold;">{errorcompanyAddressProofDoc}</div>
                                    </template>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input  type="date" placeholder="Trade License Expiry Date" label="Trade License Expiry Date"
                                        min={today} value={tradeLicenseExpiryDate} data-id="tradeLicenseExpiryDate" onchange={handleInputChange} required></lightning-input>
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="email" placeholder="email@address.com" label="Agency Email" 
                                        value={agencyEmailId} data-id="agencyEmailId" onchange={handleInputChange} required></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <!--<template if:true={internationLocation}>-->
                                        <div class="slds-grid slds-gutters">
                                            <div class="slds-col slds-size_1-of-3">
                                        
                                                <lightning-combobox data-id="agencyCountryCode"  label="Country Code"  placeholder="Choose a Country Code" 
                                                    options={countryCodeOptions}  value={agencyCountryCode}  onchange={handleInputChange}>
                                                </lightning-combobox>
                                            </div>
                                        
                                            <div class="slds-col slds-size_2-of-3">
                                                <lightning-input  pattern="[0-9]{1,12}"  placeholder="xxxx xxxx xxxx"  label="Agency Contact Number"
                                                    value={agencyContactNumber} data-id="agencyContactNumber" onchange={handleInputChange}></lightning-input>
                                            </div>
                                        </div>
                                    <!--</template>
                                    <template if:false={internationLocation}>
                                        <lightning-input  pattern="[0-9]{1,12}"  placeholder="(000) xxxx xxxx xxxx"  label="Agency Contact Number"
                                            value={agencyContactNumber} data-id="agencyContactNumber" onchange={handleInputChange}></lightning-input>
                                    </template>-->
                                </div>


                                <!--<div class="slds-col slds-size_1-of-2">
                                    <lightning-input  pattern="[0-9]{1,12}" placeholder="Ranking" label="Ranking"  
                                        value={ranking} data-id="ranking" onchange={handleInputChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-combobox data-id="salesRepId"  label="Assigned Internal Sales Person"  placeholder="Choose a Sales Person" 
                                        options={salesRepOptions}  value={salesRepId}  onchange={handleInputChange}>
                                    </lightning-combobox>
                                </div>-->
                                

                                <div class="slds-col slds-size_1-of-2">

                                    <!--<template if:true={internationLocation}>-->
                                        <div class="slds-grid slds-gutters">
                                            <div class="slds-col slds-size_1-of-3">
                                        
                                                <lightning-combobox data-id="landlineCountryCode"  label="Country Code"  placeholder="Choose a Country Code" required 
                                                    options={countryCodeOptions}  value={landlineCountryCode}  onchange={handleInputChange}>
                                                </lightning-combobox>
                                            </div>
                                        
                                            <div class="slds-col slds-size_2-of-3">
                                                <lightning-input  pattern="[0-9]{8}" placeholder="Landline(8 digit)" label="Landline" required
                                                    value={landline} data-id="landline" onchange={handleInputChange}></lightning-input>
                                            </div>
                                        </div>
                                   <!-- </template>
                                    <template if:false={internationLocation}>
                                        <lightning-input  pattern="[0-9]{1,12}" placeholder="Landline" label="Landline" required
                                        value={landline} data-id="landline" onchange={handleInputChange}></lightning-input>
                                    </template>-->
                                    
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input  placeholder="https://example.com" label="Website"  
                                        value={website} data-id="website" onchange={handleInputChange} type="url" 
                                        message-when-pattern-mismatch="Please enter a valid website URL (e.g., https://example.com)"></lightning-input>
                                </div>
                            

                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="file" data-id="POACopy" required
                                        accept={allowedFileTypes}  style="margin-bottom: 1px;"
                                        label="Attested Power of Attorney for authorized signatory Copy" onchange={handleFileUpload}></lightning-input>
                                    <template if:true={checkPOACopy}>
                                        <span style="color:green">POA Copy Uploaded</span>
                                    </template>
                                    <template if:true={errorPOACopy}>
                                        <div style="color:red;font-weight: bold;">{errorPOACopyDoc}</div>
                                    </template>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input  type="date" placeholder="POA Expiry date" label="POA Expiry date"
                                        min={today} value={POAExpiryDate} data-id="POAExpiryDate" onchange={handleInputChange}></lightning-input>
                                </div>

                                <template if:true={dubaiLocation}>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input label="ORN Number" placeholder="ORN Number" 
                                            value={ornNumber} data-id="ornNumber" onchange={handleInputChange} required></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input  type="date" placeholder="ORN Issuance Date" label="ORN Issuance Date" max={today}
                                         value={ornIssuanceDate} data-id="ornIssuanceDate" onchange={handleInputChange} required></lightning-input>
                                    </div>


                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input type="file" data-id="reraCertificate"
                                            accept={allowedFileTypes} required
                                            label="Company RERA Certificate" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                    
                                        <template if:true={checkreraCertificate}>
                                            <span style="color:green">RERA Certificate Uploaded</span>
                                        </template>
                                        <template if:true={errorreraCertificate}>
                                            <div style="color:red;font-weight: bold;">{errorreraCertificateDoc}</div>
                                        </template>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input  type="date" placeholder="ORN Expiry Date" label="ORN Expiry Date"
                                            min={today} value={ornExpiryDate} data-id="ornExpiryDate" onchange={handleInputChange} required></lightning-input>
                                    </div>
                                </template>

                                <template if:true={abudhabiLocation}>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input label="ADM Registration Number" placeholder="ADM Registration Number" 
                                            value={admRegistrationNumber} data-id="admRegistrationNumber" onchange={handleInputChange} required></lightning-input>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input  type="date" placeholder="ADM Issuance Date" label="ADM Issuance Date" max={today}
                                            value={admIssuanceDate} data-id="admIssuanceDate" onchange={handleInputChange} required></lightning-input>
                                    </div>


                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input type="file" data-id="reraCertificate"
                                            accept={allowedFileTypes}  required
                                            label="ADM Registration Certificate" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                    
                                        <template if:true={checkreraCertificate}>
                                            <span style="color:green">ADM Registration Certificate Uploaded</span>
                                        </template>
                                        <template if:true={errorreraCertificate}>
                                            <div style="color:red;font-weight: bold;">{errorreraCertificateDoc}</div>
                                        </template>
                                    </div>
                                    <div class="slds-col slds-size_1-of-2">
                                        <lightning-input  type="date" placeholder="ADM Expiry Date" label="ADM Expiry Date"
                                            min={today} value={admExpiryDate} data-id="admExpiryDate" onchange={handleInputChange} required></lightning-input>
                                    </div>
                                </template>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text" data-id="linkedInProfileName" value={linkedInProfileName}
                                        label="LinkedIn Profile Name"  placeholder="LinkedIn Profile Name" onchange={handleInputChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text" data-id="instagramProfileName" value={instagramProfileName}
                                        label="Instagram Profile Name"  placeholder="Instagram Profile Name" onchange={handleInputChange}></lightning-input>
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text" data-id="facebookProfileName" value={facebookProfileName}
                                        label="Facebook Profile Name"  placeholder="Facebook Profile Name" onchange={handleInputChange}></lightning-input>
                                </div>
                                

                            </div>
                    </div>
                    </template>

                    <template if:true={isStep2}>
                    <div class="step-section">
                        <h2 class="step-subheading">Billing Information</h2>
                            <div class="slds-grid slds-gutters slds-wrap" style="margin-top:10px;">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="officeNumber" value={officeNumber}
                                        label="Office Number"  placeholder="Office Number" onchange={handleInputChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="buildingNumber" value={buildingNumber}
                                        label="Building Number/Name"  placeholder="Building Number/Name" onchange={handleInputChange}></lightning-input>
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="streetName" value={streetName}
                                        label="Street Name/Area Name"  placeholder="Street Name/Area Name" onchange={handleInputChange}></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="detailedRegisteredAddress" value={detailedRegisteredAddress} required
                                        label="Detailed Registered Address"  placeholder="Detailed Registered Address" onchange={handleInputChange}></lightning-input>
                                        <p style="color: red; font-size: 12px; margin-top: -10px;">
                                            Please follow this pattern for Detailed Office Address: "Office No, Building Name/No, Street, Area/District, City, Country"
                                        </p>

                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="poBox" value={poBox}
                                        label="P.O. Box"  placeholder="P.O. Box" onchange={handleInputChange}></lightning-input>
                                </div>
                            </div>
                        <h2 class="step-subheading">Tax Information</h2>
                            <div class="slds-grid slds-gutters slds-wrap" style="margin-top:10px;">
                                <div class="slds-col slds-size_1-of-2">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label" for="trnNumber">
                                            <!--<template if:false={internationLocation}> <abbr class="slds-required" title="required">*</abbr></template>-->
                                            TRN (Tax Registration Number)
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-input 
                                                name="trnNumber"
                                                placeholder="TRN (Tax Registration Number)"
                                                value={trnNumber}
                                                data-id="trnNumber"
                                                onchange={handleInputChange}
                                                variant="label-hidden">
                                            </lightning-input>
                                        </div>
                                    </div>

                                    <!--<lightning-input  pattern="[0-9]{1,25}" label="TRN (Tax Registration Number)" placeholder="TRN (Tax Registration Number)" 
                                        value={trnNumber} data-id="trnNumber" onchange={handleInputChange} required></lightning-input>-->
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label" for="taxRegistrationCopy">
                                            <template if:false={internationLocation}><!--<abbr class="slds-required" title="required">*</abbr>-->Tax registration certificate</template> <template if:true={internationLocation}>Tax registration certificate/Non- VAT declaration form</template>
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-input 
                                                type="file" style="margin-bottom: 1px;"
                                                name="taxRegistrationCopy"
                                                data-id="taxRegistrationCopy"
                                                accept={allowedFileTypes}
                                                onchange={handleFileUpload}
                                                variant="label-hidden">
                                            </lightning-input>
                                        </div>
                                    </div>

                                    <!--<lightning-input type="file" data-id="taxRegistrationCopy"
                                        accept={allowedFileTypes} required
                                        label="Tax registration certificate/Non- VAT declaration form" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>-->
                
                                    <template if:true={checktaxRegistrationCopy}>
                                        <span style="color:green">
                                            <template if:false={internationLocation}>Tax registration certificate</template>
                                            <template if:true={internationLocation}>Tax registration certificate/Non- VAT declaration form Uploaded</template></span>
                                    </template>
                                    <template if:true={errortaxRegistrationCopy}>
                                        <div style="color:red;font-weight: bold;">{errortaxRegistrationCopyDoc}</div>
                                    </template>
                                </div>


                                <div class="slds-col slds-size_1-of-2">

                                    <div class="slds-form-element">
                                        <label class="slds-form-element__label" for="vatCertificate">
                                            <template if:false={internationLocation}><abbr class="slds-required" title="required">*</abbr> VAT/Non- VAT  Certificate</template>
                                            <template if:true={internationLocation}> VAT Certificate</template>
                                        </label>
                                        <div class="slds-form-element__control">
                                            <lightning-input  required
                                                type="file"
                                                name="vatCertificate"
                                                data-id="vatCertificate"
                                                accept={allowedFileTypes}
                                                onchange={handleFileUpload}
                                                variant="label-hidden">
                                            </lightning-input>
                                        </div>
                                    </div>

                                    
                                    <!--<lightning-input type="file" data-id="vatCertificate"
                                        accept={allowedFileTypes} required
                                        label="VAT Certificate" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>-->
                
                                    <template if:true={checkvatCertificate}>
                                        <span style="color:green">
                                            <template if:false={internationLocation}>VAT/Non- VAT  Certificate Uploaded</template>
                                            <template if:true={internationLocation}>VAT Certificate Uploaded</template>
                                        </span>
                                    </template>
                                    <template if:true={errorvatCertificate}>
                                        <div style="color:red;font-weight: bold;">{errorvatCertificateDoc}</div>
                                    </template>
                                </div>
                            </div>
                    </div>
                    </template>

                    <template if:true={isStep3}>
                    <div class="step-section">
                        <h2 class="step-subheading">Bank Details</h2>
                            <div class="slds-grid slds-gutters slds-wrap" style="margin-top:10px;">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="bankName" value={bankName}
                                        label="Bank Name"  placeholder="Bank Name" onchange={handleInputChange} required></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="bankBranch" value={bankBranch}
                                        label="Bank Branch"  placeholder="Bank Branch" onchange={handleInputChange} required></lightning-input>
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input pattern="[0-9]{1,25}"  data-id="accountNumber" value={accountNumber}
                                        label="Account Number"  placeholder="Account Number" onchange={handleInputChange} required></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="ibanNumber" value={ibanNumber}
                                        label="IBAN Number"  placeholder="IBAN Number" onchange={handleInputChange} required></lightning-input>
                                </div>


                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="text"  data-id="swiftCode" value={swiftCode}
                                        label="Swift Code"  placeholder="Swift Code" onchange={handleInputChange} required></lightning-input>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-input type="file" data-id="ibanLetter"
                                        accept={allowedFileTypes} required
                                        label="IBAN Letter" onchange={handleFileUpload} style="margin-bottom: 1px;"></lightning-input>
                                    <template if:true={checkibanLetter}>
                                        <span style="color:green">IBAN Letter Uploaded</span>
                                    </template>
                                    <template if:true={erroribanLetter}>
                                        <div style="color:red;font-weight: bold;">{erroribanLetterDoc}</div>
                                    </template>
                                </div>
                                <template if:true={internationLocation}>
                                    <div class="slds-col slds-size_1-of-2">
                                        <template if:true={CurrencyValues.data}>
                                            <lightning-combobox label="Currency"
                                                placeholder="Currency" data-id="accountCurrency" value={accountCurrency}
                                                options={CurrencyValues.data.values} onchange={handleInputChange} required>
                                            </lightning-combobox>
                                        </template>
                                    </div>
                                </template>
                            </div>

                        <h2 class="step-subheading">Introduced by (ORA team)</h2>
                            <div class="slds-grid slds-gutters slds-wrap" style="margin-top:10px;">
                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-combobox data-id="agencyExecutiveId"  label="ORA Broker Management Team"  placeholder="Choose a Agency Executive" 
                                        options={salesRepOptions}  value={agencyExecutiveId}  onchange={handleInputChange}>
                                    </lightning-combobox>
                                </div>

                                <div class="slds-col slds-size_1-of-2">
                                    <lightning-combobox data-id="intorducedByIds"  label="ORA Sales Team"  placeholder="Choose a Sales Team" 
                                        options={salesRepDirectorOptions}  value={formData.intorducedByIds}  onchange={handleInputChange}>
                                    </lightning-combobox>
                                    <!--<lightning-dual-listbox data-id="intorducedByIds"  label="Introduced by"  placeholder="Choose a Introduced by"

                                                            disabled={person.isSameAs}
